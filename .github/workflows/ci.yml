name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      # Используем фейковые env-переменные — для typecheck/lint/build достаточно,
      # реальные деплой получает из секретов в deploy.yml.
      - name: Setup placeholder env
        run: |
          echo "VITE_SUPABASE_URL=https://placeholder.supabase.co" >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=placeholder-key" >> $GITHUB_ENV

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        # warn-only по большинству правил — exit 0 при предупреждениях, exit 1 при ошибках
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Bundle size report
        run: |
          echo "## 📦 Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -maxdepth 1 -type f \( -name "*.js" -o -name "*.css" \) -printf "%f %s\n" 2>/dev/null \
            | sort -k2 -n -r \
            | head -10 \
            | awk '{ printf "| `%s` | %.1f KB |\n", $1, $2/1024 }' >> $GITHUB_STEP_SUMMARY || true

  edge-functions:
    name: Edge Functions Deno check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ contains(github.event.head_commit.modified, 'supabase/functions/') || github.event_name == 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno check Edge Functions
        run: |
          # Проверяем синтаксис всех index.ts в supabase/functions/
          # Не валим CI если что-то не парсится — пока в режиме отчёта.
          for f in $(find supabase/functions -name 'index.ts' -not -path '*/_shared/*'); do
            echo "Checking $f"
            deno check "$f" || echo "::warning::Deno check failed for $f"
          done
