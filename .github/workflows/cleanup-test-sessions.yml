name: Cleanup Test Sessions

on:
  schedule:
    # Запускается каждый день в 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Можно запустить вручную через GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup old test sessions
    
    steps:
      - name: Cleanup old test sessions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🧹 Starting cleanup of old test sessions..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            "$SUPABASE_URL/functions/v1/cleanup-test-sessions")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Cleanup completed successfully"
            echo "$BODY" | jq '.'
          else
            echo "❌ Cleanup failed with code $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Cleanup Test Sessions Failed',
              body: 'The daily cleanup of test sessions failed. Please check the logs.'
            })

