name: Deploy Leaderboard Fix

on:
  push:
    branches:
      - claude/fix-leaderboard-display-HQEC7

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: sbp_e0fc4539dc610aa0bc5d969f82f4b3312cd8fcfc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function duel-pass-leaderboard
        run: |
          supabase functions deploy duel-pass-leaderboard \
            --project-ref yffjnqegeiorunyvcxkn
          echo "✅ Edge Function deployed"

      - name: Apply SQL migration via Management API
        run: |
          SQL=$(cat supabase/migrations/20260415000000_fix_leaderboard_season_points.sql)
          HTTP_CODE=$(curl -s -o /tmp/migration_response.json -w "%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/yffjnqegeiorunyvcxkn/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "$(jq -n --rawfile sql supabase/migrations/20260415000000_fix_leaderboard_season_points.sql '{query: $sql}')")
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/migration_response.json
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Migration API call failed — apply manually via Supabase Dashboard"
          else
            echo "✅ Migration applied"
          fi
