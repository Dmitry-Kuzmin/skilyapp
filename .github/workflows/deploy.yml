name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master, feature/premium-race-game ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify secrets are set
        run: |
          echo "🔍 Checking secrets..."
          SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ ERROR: VITE_SUPABASE_URL secret is not set!"
            exit 1
          else
            URL_LENGTH=${#SUPABASE_URL}
            echo "✅ VITE_SUPABASE_URL is set (length: $URL_LENGTH)"
          fi
          
          if [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: VITE_SUPABASE_PUBLISHABLE_KEY secret is not set!"
            exit 1
          else
            KEY_LENGTH=${#SUPABASE_KEY}
            KEY_PREFIX=$(echo "$SUPABASE_KEY" | cut -c1-20)
            echo "✅ VITE_SUPABASE_PUBLISHABLE_KEY is set (length: $KEY_LENGTH, starts with: $KEY_PREFIX...)"
          fi
          echo "✅ All secrets are configured correctly!"
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          GITHUB_PAGES: 'true'
        continue-on-error: false
      
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Build successful: dist directory exists"
          ls -la dist/ | head -10
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





