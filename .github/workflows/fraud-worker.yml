name: Fraud Check Worker

on:
  schedule:
    # Запуск каждые 6 часов (в 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Возможность ручного запуска из GitHub UI

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fraud Check Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🚀 Starting fraud check worker..."
          
          # Проверяем наличие секретов
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌ Error: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set in GitHub secrets"
            exit 1
          fi
          
          # Вызываем Edge Function
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            "$SUPABASE_URL/functions/v1/fraud-check-worker")
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE/d')
          
          echo "📊 Response:"
          echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Error: HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Fraud check worker completed successfully"

