    <!-- КРИТИЧНО: Очистка старых Service Workers для диагностики белого экрана -->
    <script>
      // Очищаем все Service Workers при загрузке страницы
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(var registration of registrations) {
            registration.unregister().then(function(success) {
              console.log('[SW Cleanup] Unregistered:', success);
            });
          }
        });
        // Очищаем кэш
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name).then(function(success) {
                console.log('[SW Cleanup] Cache deleted:', name, success);
              });
            }
          });
        }
      }
    </script>
