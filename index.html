  <!-- Telegram Expansion Script - Mini Apps 8.0+ with requestFullscreen() -->
  <script>
    (function () {
      'use strict';

      function expandTelegramApp() {
        if (window.Telegram && window.Telegram.WebApp) {
          var tg = window.Telegram.WebApp;

          if (typeof tg.expand === 'function') {
            tg.expand();
          }

          if (typeof tg.requestFullscreen === 'function' && parseFloat(tg.version || '0') >= 8.0) {
            try {
              tg.requestFullscreen();
            } catch (e) {
              // Silent log
            }
          }

          try {
            var version = parseFloat(tg.version || '0');
            if (version >= 6.1) {
              var isLanding = window.location.pathname === '/' || window.location.pathname === '/landing' || !window.location.pathname.indexOf('/dashboard') === -1;
              var initialColor = isLanding ? '#0f172a' : '#09090b';

              if (typeof tg.setHeaderColor === 'function') {
                tg.setHeaderColor(initialColor);
              }
              if (typeof tg.setBackgroundColor === 'function') {
                tg.setBackgroundColor(initialColor);
              }
            }
          } catch (e) {
            // Error setting colors
          }

          if (typeof tg.ready === 'function') tg.ready();

          return true;
        }
        return false;
      }

      if (!expandTelegramApp()) {
        var attempts = 0;
        var maxAttempts = 10;
        var interval = setInterval(function () {
          attempts++;
          if (expandTelegramApp() || attempts >= maxAttempts) {
            clearInterval(interval);
          }
        }, 50);
      }
    })();
  </script>

  <!-- 🚀 Дополнительный fallback: expand() после загрузки всех скриптов -->
  <script>
    function checkAndExpand() {
      if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initData || window.Telegram.WebApp.initData === 'mock_init_data') {
        return false;
      }

      var tg = window.Telegram.WebApp;

      try {
        if (typeof tg.expand === 'function') tg.expand();
        if (typeof tg.ready === 'function') tg.ready();
      } catch (e) {
        console.warn('[Telegram Expand] expand error:', e);
      }

      return true;
    }

    window.addEventListener('load', function () {
      checkAndExpand();
    });

    document.addEventListener('DOMContentLoaded', function () {
      checkAndExpand();
    });
  </script>
</body>

</html>
