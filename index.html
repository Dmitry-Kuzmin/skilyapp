  <!-- КРИТИЧНО: Загружаем Telegram SDK только если мы действительно в Telegram или на localhost (для мока) -->
  <script>
    (function () {
      // MOCK MONETAG & AD SYSTEMS ON LOCALHOST (ROBUST VERSION)
      // Это предотвращает загрузку внешних скриптов (vignette.min.js), которые ломают IndexedDB и WebSocket
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('[Dev] 🛡️ Mocking Ad Systems to prevent crashes (Protocol v3)');

        // Mock Monetag Functions
        window.show_10323437 = function () { console.log('[Dev] Mock Monetag Interstitial shown'); return Promise.resolve(true); };
        window.show_10323643 = function () { console.log('[Dev] Mock Monetag Rewarded shown'); return Promise.resolve(true); };

        // 1. Monkey Patch document.createElement
        const originalCreateElement = document.createElement;
        document.createElement = function (tagName) {
          const element = originalCreateElement.call(document, tagName);
          if (tagName.toLowerCase() === 'script') {
            Object.defineProperty(element, 'src', {
              set: function (url) {
                if (url && (typeof url === 'string') && (url.includes('monetag') || url.includes('groleegni') || url.includes('gizokraijaw') || url.includes('vignette'))) {
                  console.warn('[Dev] 🛡️ Blocked Ad Script (createElement):', url);
                  return; // Block assignment
                }
                this.setAttribute('src', url);
              },
              get: function () { return this.getAttribute('src'); }
            });
          }
          return element;
        };

        // 2. Monkey Patch appendChild and insertBefore
        const isAdScript = (node) => {
          if (node && node.tagName === 'SCRIPT') {
            const src = node.src || node.getAttribute('src');
            if (src && (src.includes('monetag') || src.includes('groleegni') || src.includes('gizokraijaw') || src.includes('vignette'))) {
              console.warn('[Dev] 🛡️ Blocked Ad Script (DOM Injection):', src);
              if (node.parentNode) node.remove(); // Remove if already attached
              return true;
            }
          }
          return false;
        };

        const originalAppendChild = Node.prototype.appendChild;
        Node.prototype.appendChild = function (child) {
          if (isAdScript(child)) return child;
          return originalAppendChild.call(this, child);
        };

        const originalInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function (newNode, referenceNode) {
          if (isAdScript(newNode)) return newNode;
          return originalInsertBefore.call(this, newNode, referenceNode);
        };
      }

      const isTelegram = window.location.hash.includes('tgWebAppData') ||
        window.location.search.includes('tgWebAppPlatform') ||
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      }
    })();
  </script>

  <!-- Telegram Expansion Script - Mini Apps 8.0+ with requestFullscreen() -->
  <script>
    (function () {
      'use strict';
      const SCRIPT_VERSION = 'v6.0-fullscreen';

      const log = function (msg, data) {
        if (typeof console !== 'undefined' && console.log && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')) {
          console.log('[System/TG] ' + msg, data || '');
        }
      };

      function expandTelegramApp() {
        if (window.Telegram && window.Telegram.WebApp) {
          const tg = window.Telegram.WebApp;

          // ============================================================================
          // GOLDEN RULES v3.0 - RULE 3.5: requestFullscreen() (Mini Apps 8.0+)
          // @see RULES_LAYOUT.md
          // ============================================================================

          // 1. Сначала вызываем старый expand() для совместимости
          if (typeof tg.expand === 'function') {
            tg.expand();
          }

          // 2. МАГИЯ Mini Apps 8.0+ — иммерсивный режим на полный экран
          // requestFullscreen() переводит в режим без шторки, как у BotFather
          // Проверяем версию, чтобы не вызывать ошибку на старых клиентах
          if (typeof tg.requestFullscreen === 'function' && parseFloat(tg.version) >= 8.0) {
            try {
              tg.requestFullscreen();
            } catch (e) {
              // Тихий лог, не пугаем пользователя
              if (window.location.hostname === 'localhost') console.debug('[TG] requestFullscreen failed', e);
            }
          }

          // 3. Красим UI (Chameleon Protocol)
          // setHeaderColor и setBackgroundColor требуют v6.1+
          try {
            const version = parseFloat(tg.version || '0');
            if (version >= 6.1) {
              if (typeof tg.setHeaderColor === 'function') {
                tg.setHeaderColor('#09090b');
              }
              if (typeof tg.setBackgroundColor === 'function') {
                tg.setBackgroundColor('#09090b');
              }
            } else {
              if (window.location.hostname === 'localhost') console.debug('[TG] Colors skipped for v' + version);
            }
          } catch (e) {
            log('⚠️ Error setting colors', e);
          }

          // 4. Ready
          if (typeof tg.ready === 'function') tg.ready();

          return true;
        }
        return false;
      }

      // Try immediately — как можно раньше!
      if (!expandTelegramApp()) {
        let attempts = 0;
        const maxAttempts = 10; // Уменьшим количество попыток, чтобы не спамить
        const interval = setInterval(function () {
          attempts++;
          if (expandTelegramApp() || attempts >= maxAttempts) {
            clearInterval(interval);
          }
        }, 50);
      }
    })();
  </script>

  <!-- ОПТИМИЗАЦИЯ: telegram-widget.js откладываем до взаимодействия пользователя -->
  <!-- Загружается только при скролле или через 3 секунды после загрузки страницы -->
  <script>
    (function () {
      let widgetLoaded = false;
      const loadWidget = () => {
        if (widgetLoaded) return;
        widgetLoaded = true;
        const script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.defer = true;
        script.crossOrigin = 'anonymous'; // Для лучшей совместимости с Safari Privacy
        document.head.appendChild(script);
      };

      // Загружаем при скролле
      let scrollTimer;
      window.addEventListener('scroll', () => {
        if (!widgetLoaded) {
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(loadWidget, 100);
        }
      }, { once: true, passive: true });

      // Загружаем при клике
      window.addEventListener('click', loadWidget, { once: true });

      // Загружаем через 3 секунды (fallback)
      setTimeout(loadWidget, 3000);
    })();
  </script>

  <div class="app-skeleton">

  <!-- PWA Service Worker управляется через vite-plugin-pwa -->
  <!-- НЕ удаляем SW вручную - это блокирует offline режим -->
  <script>
    (function () {
      'use strict';

      // 🚨 КРИТИЧНО: Принудительная очистка кэша для обхода проблем с кэшированием
      // Версия приложения - автоматически обновляется при деплое
      const APP_VERSION = '2026-01-16-18:11';
      const CACHE_KEY = 'skilyapp_version';

      // 🛡️ ЗАЩИТА ОТ МОДУЛЬНЫХ ОШИБОК: Перезагрузка при "Failed to fetch dynamically imported module"
      window.addEventListener('error', function (e) {
        if (e.message && (
          e.message.indexOf('Importing a module script failed') !== -1 ||
          e.message.indexOf('Failed to fetch dynamically imported module') !== -1
        )) {
          console.error('[CRITICAL] Module loading failed. Reloading page...', e);
          // Делаем задержку перед перезагрузкой, чтобы не войти в бесконечный цикл
          const lastReload = localStorage.getItem('last_module_reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload) > 30000) {
            localStorage.setItem('last_module_reload', now.toString());
            // window.location.reload(); // Disabled to prevent infinite loop
            console.warn('[HTML] Reload disabled for debugging.');
          }
        }
      }, true);

      // Проверяем версию в localStorage
      const storedVersion = localStorage.getItem(CACHE_KEY);
      if (storedVersion !== APP_VERSION) {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          console.log('[HTML] 🔄 New version detected! Clearing cache...', {
            stored: storedVersion,
            current: APP_VERSION,
          });
        }

        // Очищаем localStorage (кроме важных данных)
        const importantKeys = ['sb-yffjnqegeiorunyvcxkn-auth-token', 'user_preferences'];
        const keysToKeep = {};
        importantKeys.forEach(key => {
          const value = localStorage.getItem(key);
          if (value) keysToKeep[key] = value;
        });
        localStorage.clear();
        Object.keys(keysToKeep).forEach(key => {
          localStorage.setItem(key, keysToKeep[key]);
        });

        // Очищаем sessionStorage
        sessionStorage.clear();

        // Очищаем кэш через Cache API
        if ('caches' in window) {
          caches.keys().then(names => {
            names.forEach(name => {
              caches.delete(name);
              console.log('[HTML] 🗑️ Deleted cache:', name);
            });
          });
        }

        // Сохраняем новую версию
        localStorage.setItem(CACHE_KEY, APP_VERSION);

        // Принудительная перезагрузка с cache busting
        const url = new URL(window.location.href);
        url.searchParams.set('_v', Date.now());
        url.searchParams.set('_clear_cache', '1');
        console.log('[HTML] 🔄 Reloading with cache bust:', url.toString());
        window.location.replace(url.toString());
        return; // Останавливаем выполнение (теперь это легально, так как мы внутри функции)
      }

      // КРИТИЧНО: Добавляем версию в URL для принудительной инвалидации кэша
      const CACHE_BUST = '?v=' + Date.now();

      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('[HTML] ✅ Script execution started', {
          timestamp: new Date().toISOString(),
          readyState: document.readyState,
          location: window.location.href,
          cacheBust: CACHE_BUST,
          appVersion: APP_VERSION,
        });
      }

      // Проверяем, что модули поддерживаются
      // Используем проверку через другие признаки поддержки ES модулей
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('noModule' in HTMLScriptElement.prototype) {
          console.log('[HTML] ✅ ES modules supported');
        } else {
          console.error('[HTML] ❌ ES modules NOT supported!');
        }
      }

      // Отслеживаем ошибки загрузки модулей
      window.addEventListener('error', function (e) {
        if (e.filename && (e.filename.includes('main') || e.filename.includes('react-vendor'))) {
          console.error('[HTML] ❌ Module load error:', {
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            error: e.error,
          });
        }
      }, true);

      // Дополнительная проверка: если через 5 секунд нет логов [Main], принудительно очищаем кэш
      setTimeout(() => {
        if (!window._mainLoaded) {
          console.warn('[HTML] ⚠️ Main module not loaded after 5s, forcing cache clear...');
          localStorage.removeItem(CACHE_KEY);
          const url = new URL(window.location.href);
          url.searchParams.set('_force_reload', Date.now());
          window.location.replace(url.toString());
        }
      }, 5000);
    })(); // Закрываем IIFE
  </script>

  <!-- 🚀 Дополнительный fallback: expand() после загрузки всех скриптов -->
  <script>
    // КРИТИЧНО: Проверяем, что это действительно Mini App, а не обычный сайт
    function checkAndExpand() {
      // КРИТИЧНО: Если мы не в Telegram, просто выходим без логов
      if (!window.Telegram?.WebApp?.initData || window.Telegram.WebApp.initData === 'mock_init_data') {
        return false;
      }

      const tg = window.Telegram.WebApp;

      try {
        if (typeof tg.expand === 'function') tg.expand();

        // Тихий лог состояния только для отладки
        if (window.location.hostname === 'localhost') {
          console.debug('[Telegram Expand] State:', {
            platform: tg.platform,
            version: tg.version,
            isExpanded: tg.isExpanded
          });
        }
      } catch (e) {
        // Ошибка только если что-то реально упало
        console.warn('[Telegram Expand] expand error:', e);
      }

      return true;
    }

    // Этот скрипт выполняется после загрузки всех модулей
    window.addEventListener('load', function () {
      if (window.location.hostname === 'localhost') console.error('[Telegram Expand LOAD] 🚀 window.load event fired');
      checkAndExpand();
    });

    // Также пробуем на DOMContentLoaded
    document.addEventListener('DOMContentLoaded', function () {
      if (window.location.hostname === 'localhost') console.error('[Telegram Expand DOM] 🚀 DOMContentLoaded event fired');
      checkAndExpand();
    });
  </script>
