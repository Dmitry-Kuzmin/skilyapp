            } catch (e) {
              // Тихий лог, не пугаем пользователя
              if (window.location.hostname === 'localhost') console.debug('[TG] requestFullscreen failed', e);
            }
          }

          // 3. Красим UI (Chameleon Protocol)
          // setHeaderColor и setBackgroundColor требуют v6.1+
          try {
            const version = parseFloat(tg.version || '0');
            if (version >= 6.1) {
              // Динамическое определение начального цвета для предотвращения моргания
              const isLanding = window.location.pathname === '/' || window.location.pathname === '/landing';
              const initialColor = isLanding ? '#0f172a' : '#09090b';

              if (typeof tg.setHeaderColor === 'function') {
                tg.setHeaderColor(initialColor);
              }
              if (typeof tg.setBackgroundColor === 'function') {
                tg.setBackgroundColor(initialColor);
              }
            } else {
              if (window.location.hostname === 'localhost') console.debug('[TG] Colors skipped for v' + version);
            }
          } catch (e) {
            log('⚠️ Error setting colors', e);
          }

          // 4. Ready
          if (typeof tg.ready === 'function') tg.ready();

          return true;
        }
        return false;
      }

      // Try immediately — как можно раньше!
      if (!expandTelegramApp()) {
        let attempts = 0;
        const maxAttempts = 10; // Уменьшим количество попыток, чтобы не спамить
        const interval = setInterval(function () {
          attempts++;
          if (expandTelegramApp() || attempts >= maxAttempts) {
            clearInterval(interval);
          }
        }, 50);
      }
    })();
  </script>

  <script>
    (function () {
      'use strict';

      // 🚨 КРИТИЧНО: Принудительная очистка кэша для обхода проблем с кэшированием
      // Версия приложения - автоматически обновляется при деплое
      const APP_VERSION = '2026-03-29-09:14';
      const CACHE_KEY = 'skilyapp_version';

      // 🛡️ ЗАЩИТА ОТ МОДУЛЬНЫХ ОШИБОК (Version Mismatch Handler)
      window.addEventListener('error', function (e) {
        const msg = (e.message || '').toLowerCase();
        const isModuleError =
          msg.indexOf('importing a module script failed') !== -1 ||
          msg.indexOf('failed to fetch dynamically imported module') !== -1 ||
          msg.indexOf("'text/html' is not a valid javascript mime type") !== -1 ||
          msg.indexOf('loading chunk') !== -1;

        if (isModuleError) {
          console.error('[CRITICAL] Module loading failed (Deployment mismatch). Attempting recovery...', e);

          // Проверяем счетчик перезагрузок для защиты от бесконечного цикла
          const storageKey = 'module_reload_count';
          const timeKey = 'module_reload_time';

          const count = parseInt(localStorage.getItem(storageKey) || '0');
          const lastTime = parseInt(localStorage.getItem(timeKey) || '0');
          const now = Date.now();

          // Сбрасываем счетчик, если прошло больше 120 секунд
          const currentCount = (now - lastTime > 120000) ? 0 : count;

          if (currentCount < 3) {
            localStorage.setItem(storageKey, (currentCount + 1).toString());
            localStorage.setItem(timeKey, now.toString());

            console.log(`[HTML] Reloading page (Attempt ${currentCount + 1}/3)...`);

            setTimeout(() => {
              window.location.reload(true);
            }, 500);
          } else {
            console.error('[CRITICAL] Reload limit exceeded. Showing manual recovery prompt.');
            // Показываем сообщение пользователю, вместо бесконечного цикла
            const root = document.getElementById('root') || document.body;
            root.innerHTML = `
               <div style="
                 position: fixed; inset: 0; background: #0f172a; color: white;
                 display: flex; flex-direction: column; align-items: center; justify-content: center;
                 font-family: sans-serif; text-align: center; padding: 20px; z-index: 9999;
               ">
                 <h2 style="color: #ef4444; margin-bottom: 10px;">Обновление приложения</h2>
                 <p style="color: #a1a1aa; margin-bottom: 20px; max-width: 400px;">
                   Мы выпустили важное обновление. Пожалуйста, нажмите кнопку ниже, чтобы загрузить новую версию.
                 </p>
                 <button onclick="localStorage.removeItem('module_reload_count'); window.location.reload(true);" style="
                   background: #2563eb; color: white; border: none; padding: 12px 24px;
                   border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
                 ">
                   Обновить сейчас
                 </button>
               </div>
             `;
          }
        }
      }, true);

      // Проверяем версию в localStorage
      const storedVersion = localStorage.getItem(CACHE_KEY);
      if (storedVersion !== APP_VERSION) {
        console.log('[HTML] 🔄 New version detected! Clearing cache...', {
          stored: storedVersion,
          current: APP_VERSION,
        });

        // Очищаем localStorage (кроме важных данных)
        const importantKeys = ['sb-yffjnqegeiorunyvcxkn-auth-token', 'user_preferences', 'telegram_user', 'puzzle_user'];
        const keysToKeep = {};
        importantKeys.forEach(key => {
          const value = localStorage.getItem(key);
          if (value) keysToKeep[key] = value;
        });

        localStorage.clear();

        Object.keys(keysToKeep).forEach(key => {
          localStorage.setItem(key, keysToKeep[key]);
        });

        // Сохраняем новую версию
        localStorage.setItem(CACHE_KEY, APP_VERSION);

        // Принудительная перезагрузка без cache-busting параметров (Vercel CDN кэширует)
        window.location.reload();
        return;
      }

      // Отслеживаем ошибки загрузки модулей
      window.addEventListener('error', function (e) {
        if (e.filename && (e.filename.includes('main') || e.filename.includes('react-vendor'))) {
          console.error('[HTML] ❌ Module load error:', {
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            error: e.error,
          });
        }
      }, true);

      // 🛡️ ХАРДВОРК: Таймер загрузки основного модуля
      // Если за 15 секунд приложение не просигнализировало о загрузке - пробуем восстановить
      setTimeout(function () {
        if (!window._mainLoaded) {
          console.error('[HTML] Main module not loaded after 15s, forcing cache clear...');

          // Удаляем токен, так как 400 error refresh_token часто блокирует загрузку
          localStorage.removeItem('sb-yffjnqegeiorunyvcxkn-auth-token');

          window.location.reload();
        }
      }, 15000);
    })();

  </script>

  <!-- 🚀 Дополнительный fallback: expand() после загрузки всех скриптов -->
  <script>
    // КРИТИЧНО: Проверяем, что это действительно Mini App, а не обычный сайт
    function checkAndExpand() {
      // КРИТИЧНО: Если мы не в Telegram, просто выходим без логов
      if (!window.Telegram?.WebApp?.initData || window.Telegram.WebApp.initData === 'mock_init_data') {
        return false;
      }

      const tg = window.Telegram.WebApp;

      try {
        if (typeof tg.expand === 'function') tg.expand();

        // Тихий лог состояния только для отладки
        if (window.location.hostname === 'localhost') {
          console.debug('[Telegram Expand] State:', {
            platform: tg.platform,
            version: tg.version,
            isExpanded: tg.isExpanded
          });
        }
      } catch (e) {
        // Ошибка только если что-то реально упало
        console.warn('[Telegram Expand] expand error:', e);
      }

      return true;
    }

    // Этот скрипт выполняется после загрузки всех модулей
    window.addEventListener('load', function () {
      if (window.location.hostname === 'localhost') console.debug('[Telegram Expand LOAD] 🚀 window.load event fired');
      checkAndExpand();
    });

    // Также пробуем на DOMContentLoaded
    document.addEventListener('DOMContentLoaded', function () {
      if (window.location.hostname === 'localhost') console.debug('[Telegram Expand DOM] 🚀 DOMContentLoaded event fired');
      checkAndExpand();
    });
  </script>
