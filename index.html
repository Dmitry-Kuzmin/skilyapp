    <!-- Критический CSS inline для ускорения FCP -->
    <style>
      /* Критический CSS для первого рендера */
      *{margin:0;padding:0;box-sizing:border-box}
      html{overflow-x:hidden;width:100%}
      body{min-height:100vh;margin:0;overflow-x:hidden;width:100%;max-width:100vw;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#09090b;color:#fafafa}
      #root{min-height:100vh;position:relative}
      
      /* SKELETON LOADER - показывается мгновенно пока загружается React */
      .app-skeleton{
        position:absolute;
        top:0;
        left:0;
        right:0;
        bottom:0;
        background:#09090b;
        z-index:9999;
        padding:1rem;
      }
      .skeleton-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:1rem 0;
        margin-bottom:2rem;
      }
      .skeleton-logo{
        width:100px;
        height:32px;
        background:linear-gradient(90deg,#27272a 0%,#3f3f46 50%,#27272a 100%);
        background-size:200% 100%;
        animation:shimmer 1.5s infinite;
        border-radius:8px;
      }
      .skeleton-avatar{
        width:40px;
        height:40px;
        background:linear-gradient(90deg,#27272a 0%,#3f3f46 50%,#27272a 100%);
        background-size:200% 100%;
        animation:shimmer 1.5s infinite;
        border-radius:50%;
      }
      .skeleton-cards{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
        gap:1rem;
        margin-bottom:1.5rem;
      }
      .skeleton-card{
        background:#18181b;
        border:1px solid #27272a;
        border-radius:12px;
        padding:1.5rem;
        height:140px;
      }
      .skeleton-title{
        width:60%;
        height:20px;
        background:linear-gradient(90deg,#27272a 0%,#3f3f46 50%,#27272a 100%);
        background-size:200% 100%;
        animation:shimmer 1.5s infinite;
        border-radius:4px;
        margin-bottom:0.75rem;
      }
      .skeleton-text{
        width:40%;
        height:14px;
        background:linear-gradient(90deg,#27272a 0%,#3f3f46 50%,#27272a 100%);
        background-size:200% 100%;
        animation:shimmer 1.5s infinite;
        border-radius:4px;
      }
      @keyframes shimmer{
        0%{background-position:200% 0}
        100%{background-position:-200% 0}
      }
      
      /* Скрываем скелетон когда React загрузился */
      #root:not(:empty) + .app-skeleton,
      #root.react-loaded + .app-skeleton{
        display:none;
      }
      
      /* Оптимизация для быстрого рендеринга */
      img{max-width:100%;height:auto;display:block}
      [hidden]{display:none!important}
      /* Предотвращение layout shift */

    <!-- Telegram WebApp Scripts - загружаем асинхронно, не блокируя рендеринг -->
    <!-- КРИТИЧНО: telegram-web-app.js нужен для инициализации, загружаем с defer -->
    <!-- crossorigin="anonymous" для лучшей совместимости с Safari Privacy -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer crossorigin="anonymous"></script>
    <!-- ОПТИМИЗАЦИЯ: telegram-widget.js откладываем до взаимодействия пользователя -->
    <!-- Загружается только при скролле или через 3 секунды после загрузки страницы -->
    <script>
      (function() {
        let widgetLoaded = false;
        const loadWidget = () => {
          if (widgetLoaded) return;
          widgetLoaded = true;
          const script = document.createElement('script');
          script.src = 'https://telegram.org/js/telegram-widget.js?22';
          script.defer = true;
          script.crossOrigin = 'anonymous'; // Для лучшей совместимости с Safari Privacy
          document.head.appendChild(script);
        };
        
        // Загружаем при скролле
        let scrollTimer;
        window.addEventListener('scroll', () => {
          if (!widgetLoaded) {
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(loadWidget, 100);
          }
        }, { once: true, passive: true });
        
        // Загружаем при клике
        window.addEventListener('click', loadWidget, { once: true });
        
        // Загружаем через 3 секунды (fallback)
        setTimeout(loadWidget, 3000);
      })();
    </script>
    
    <!-- Development: Telegram WebApp Mock - загружаем только на localhost -->
    <script>

        const script = document.createElement('script');
        script.src = '/telegram-mock.js';
        script.defer = true;
        document.head.appendChild(script);
      }
    </script>
