    <!-- Версия: v3.0 - улучшенная с агрессивным логированием и проверками -->
    <script>

        // Используем console.error для максимальной заметности в логах
        try {
          console.error('═══════════════════════════════════════════════════════');
          console.error('[Telegram Expand HEAD] 🚀🚀🚀 SCRIPT LOADED 🚀🚀🚀');
          console.error('[Telegram Expand HEAD] Version:', SCRIPT_VERSION);
          console.error('[Telegram Expand HEAD] Time:', new Date().toISOString());
          console.error('[Telegram Expand HEAD] Document readyState:', document.readyState);
          console.error('[Telegram Expand HEAD] Window.Telegram exists:', typeof window !== 'undefined' && !!window.Telegram);
          console.error('[Telegram Expand HEAD] Window.Telegram.WebApp exists:', typeof window !== 'undefined' && !!window.Telegram?.WebApp);
          if (typeof window !== 'undefined' && window.Telegram?.WebApp) {
            console.error('[Telegram Expand HEAD] WebApp platform:', window.Telegram.WebApp.platform);
            console.error('[Telegram Expand HEAD] WebApp version:', window.Telegram.WebApp.version);
            console.error('[Telegram Expand HEAD] WebApp isExpanded:', window.Telegram.WebApp.isExpanded);
          }
          console.error('═══════════════════════════════════════════════════════');
        } catch (e) {
          // Fallback если console не доступен
          if (typeof window !== 'undefined') {
            window._telegramExpandLog = window._telegramExpandLog || [];
            window._telegramExpandLog.push('[Telegram Expand HEAD] Script loaded: ' + SCRIPT_VERSION);
          }
        }
        
        let expandCalled = false;
        let expandAttempts = 0;
        const MAX_EXPAND_ATTEMPTS = 3; // Вызываем expand() несколько раз для надежности
        
        // Функция для принудительного разворачивания приложения
        function expandTelegramApp(attemptNumber) {
          try {
            // Агрессивное логирование для диагностики
            console.log('[Telegram Expand] 🔍 Checking Telegram WebApp (attempt', attemptNumber, '):', {
              hasWindow: typeof window !== 'undefined',
              hasTelegram: typeof window !== 'undefined' && !!window.Telegram,
              hasWebApp: typeof window !== 'undefined' && !!window.Telegram?.WebApp,
              webAppType: typeof window !== 'undefined' && window.Telegram?.WebApp ? typeof window.Telegram.WebApp : 'undefined',
              hasExpand: typeof window !== 'undefined' && window.Telegram?.WebApp ? typeof window.Telegram.WebApp.expand : 'undefined',
              platform: typeof window !== 'undefined' && window.Telegram?.WebApp?.platform || 'unknown',
              version: typeof window !== 'undefined' && window.Telegram?.WebApp?.version || 'unknown',
              isExpanded: typeof window !== 'undefined' && window.Telegram?.WebApp?.isExpanded || false
            });
            
            if (window.Telegram && window.Telegram.WebApp) {
              const tg = window.Telegram.WebApp;
              
              // Принудительно разворачиваем на весь экран (вызываем несколько раз для надежности)
              if (typeof tg.expand === 'function') {
                try {
                  tg.expand();
                  expandCalled = true;
                  expandAttempts++;
                  // Используем console.error для максимальной видимости

                  console.error('[Telegram Expand HEAD] ✅✅✅ EXPAND() CALLED ✅✅✅');

                    platform: tg.platform,
                    version: tg.version,
                    viewportHeight: tg.viewportHeight,

                  });
                  console.error('═══════════════════════════════════════════════════════');
                  
                  // Вызываем еще раз через небольшую задержку для надежности

        if (expandTelegramApp(1)) {
          console.log('[Telegram Expand] ✅✅✅ Telegram WebApp already available, expanded immediately');
        } else {
          console.log('[Telegram Expand] ⏳ Telegram WebApp not ready, starting polling...');

          let attempts = 0;
          const maxAttempts = 200; // Увеличено до 1000ms ожидания (200 * 5ms)
          
          const checkInterval = setInterval(function() {
            attempts++;
            
            if (expandTelegramApp(attempts + 1)) {

              console.error('[Telegram Expand] 📋 Final check:', {
                windowExists: typeof window !== 'undefined',
                TelegramExists: typeof window !== 'undefined' && !!window.Telegram,
                WebAppExists: typeof window !== 'undefined' && !!window.Telegram?.WebApp,
                userAgent: typeof navigator !== 'undefined' ? navigator.userAgent : 'unknown'
              });
            }
          }, 5); // Проверяем каждые 5ms для минимальной задержки (быстрее чем 10ms)
          
          // Fallback: также слушаем событие загрузки скрипта
          document.addEventListener('DOMContentLoaded', function() {
            if (!expandCalled) {
              expandTelegramApp('DOMContentLoaded');
            }
          });
          
          // Дополнительный fallback: window.onload
          window.addEventListener('load', function() {
            if (!expandCalled && window.Telegram && window.Telegram.WebApp) {
              expandTelegramApp('window.load');
            }
          });
        }
        
        // КРИТИЧНО: Также вызываем expand() при первом взаимодействии пользователя (на случай если все остальное не сработало)
        ['touchstart', 'click', 'mousedown'].forEach(function(eventType) {
          document.addEventListener(eventType, function() {
            if (!expandCalled && window.Telegram && window.Telegram.WebApp) {
              expandTelegramApp('user-interaction-' + eventType);
            }
          }, { once: true, passive: true });
        });
      })();
    </script>

    <!-- 🚀 КРИТИЧНО: Самый ранний скрипт expand() - выполняется ДО всего остального -->
    <script>
      // КРИТИЧНО: Этот скрипт выполняется в самом начале body, до загрузки React
      // Используем немедленно вызываемую функцию для максимально раннего выполнения
      (function() {
        'use strict';
        
        // Логируем ВСЕГДА, даже если console еще не готов
        var log = function(msg, data) {
          try {
            if (typeof console !== 'undefined' && console.log) {
              console.log(msg, data || '');
            }
          } catch(e) {}
          // Fallback: сохраняем в window для последующего просмотра
          if (typeof window !== 'undefined') {
            window._telegramExpandLogs = window._telegramExpandLogs || [];
            window._telegramExpandLogs.push({msg: msg, data: data, time: new Date().toISOString()});
          }
        };
        
        // Используем console.error для максимальной видимости
        try {
          console.error('═══════════════════════════════════════════════════════');
          console.error('[Telegram Expand BODY] 🚀🚀🚀 BODY SCRIPT STARTED 🚀🚀🚀');
          console.error('[Telegram Expand BODY] Time:', new Date().toISOString());
          console.error('[Telegram Expand BODY] Document readyState:', document.readyState);
          console.error('[Telegram Expand BODY] Window exists:', typeof window !== 'undefined');
          console.error('═══════════════════════════════════════════════════════');
        } catch(e) {}
        
        log('[Telegram Expand BODY] 🚀 EARLY SCRIPT STARTED in body tag');
        log('[Telegram Expand BODY] 📋 Document readyState:', document.readyState);
        log('[Telegram Expand BODY] 📋 Window exists:', typeof window !== 'undefined');
        
        // КРИТИЧНО: Диагностика - проверяем, действительно ли это Mini App
        if (typeof window !== 'undefined') {
          var isMiniApp = !!(window.Telegram && window.Telegram.WebApp);
          var hasInitData = isMiniApp && window.Telegram.WebApp.initData && window.Telegram.WebApp.initData !== '';
          var platform = isMiniApp ? window.Telegram.WebApp.platform : 'unknown';
          var version = isMiniApp ? window.Telegram.WebApp.version : 'unknown';
          
          log('[Telegram Expand BODY] 🔍 DIAGNOSTICS:', {
            isMiniApp: isMiniApp,
            hasInitData: hasInitData,
            platform: platform,
            version: version,
            isExpanded: isMiniApp ? window.Telegram.WebApp.isExpanded : false,
            viewportHeight: isMiniApp ? window.Telegram.WebApp.viewportHeight : 0,
            userAgent: typeof navigator !== 'undefined' ? navigator.userAgent : 'unknown'
          });
          
          // КРИТИЧНО: Если это НЕ Mini App, показываем предупреждение
          if (!isMiniApp) {
            log('[Telegram Expand BODY] ❌❌❌ NOT A MINI APP! This is opened as regular website.');
            log('[Telegram Expand BODY] ❌ Menu Button may be configured as "url" instead of "web_app"');
            log('[Telegram Expand BODY] ❌ expand() will NOT work in regular website mode');
          }
        }
        
        // Функция для немедленного expand()
        function tryExpand() {
          try {
            if (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) {
              var tg = window.Telegram.WebApp;
              log('[Telegram Expand BODY] ✅ Found Telegram WebApp!');
              
              if (typeof tg.expand === 'function') {
                tg.expand();
                // Используем console.error для максимальной видимости
                try {
                  console.error('═══════════════════════════════════════════════════════');
                  console.error('[Telegram Expand BODY] ✅✅✅ EXPAND() CALLED IN BODY ✅✅✅');
                  console.error('[Telegram Expand BODY] isExpanded:', tg.isExpanded);
                  console.error('═══════════════════════════════════════════════════════');
                } catch(e) {}
                log('[Telegram Expand BODY] ✅✅✅ expand() called in BODY script!');
                
                // Вызываем еще раз через 50ms для надежности
                setTimeout(function() {
                  if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.expand === 'function') {
                    window.Telegram.WebApp.expand();
                    log('[Telegram Expand BODY] ✅✅✅ expand() called again (retry)');
                  }
                }, 50);
                
                return true;
              } else {
                log('[Telegram Expand BODY] ⚠️ expand() function not available');
              }
            } else {
              log('[Telegram Expand BODY] ⏳ Telegram WebApp not ready yet');
            }
          } catch(e) {
            log('[Telegram Expand BODY] ❌ Error:', e.message);
          }
          return false;
        }
        
        // Пытаемся сразу
        if (!tryExpand()) {
          log('[Telegram Expand BODY] ⏳ Starting polling...');
          
          // Агрессивный polling каждые 5ms
          var attempts = 0;
          var maxAttempts = 200;
          var interval = setInterval(function() {
            attempts++;
            if (tryExpand()) {
              clearInterval(interval);
              log('[Telegram Expand BODY] ✅✅✅ Success after', attempts * 5, 'ms');
            } else if (attempts >= maxAttempts) {
              clearInterval(interval);
              log('[Telegram Expand BODY] ❌ Failed after', maxAttempts * 5, 'ms');
            }
          }, 5);
        }
      })();
    </script>

          if ('caches' in window) {

          // Сохраняем новую версию
          localStorage.setItem(CACHE_KEY, APP_VERSION);
          
          // Принудительная перезагрузка с cache busting
          const url = new URL(window.location.href);

        }
      
      // КРИТИЧНО: Добавляем версию в URL для принудительной инвалидации кэша
      const CACHE_BUST = '?v=' + Date.now();
      
      console.log('[HTML] ✅ Script execution started', {
        timestamp: new Date().toISOString(),
        readyState: document.readyState,
        location: window.location.href,
        cacheBust: CACHE_BUST,
        appVersion: APP_VERSION,
      });
      
      // Проверяем, что модули поддерживаются
      // Используем проверку через другие признаки поддержки ES модулей
      if ('noModule' in HTMLScriptElement.prototype) {
        console.log('[HTML] ✅ ES modules supported');
      } else {
        console.error('[HTML] ❌ ES modules NOT supported!');
      }
      
      // Отслеживаем ошибки загрузки модулей
      window.addEventListener('error', function(e) {
        if (e.filename && (e.filename.includes('main') || e.filename.includes('react-vendor'))) {
          console.error('[HTML] ❌ Module load error:', {
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            error: e.error,
          });
        }
      }, true);
      
        // Дополнительная проверка: если через 5 секунд нет логов [Main], принудительно очищаем кэш
        setTimeout(() => {
          if (!window._mainLoaded) {
            console.warn('[HTML] ⚠️ Main module not loaded after 5s, forcing cache clear...');
            localStorage.removeItem(CACHE_KEY);
            const url = new URL(window.location.href);
            url.searchParams.set('_force_reload', Date.now());

      })(); // Закрываем IIFE
    </script>
