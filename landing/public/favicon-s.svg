<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="blue_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#2563eb" />
            <stop offset="100%" stop-color="#1d4ed8" />
        </linearGradient>
        <clipPath id="circle_clip">
            <rect width="512" height="512" rx="120" />
        </clipPath>
    </defs>
    
    <!-- Используем чуть больший радиус или полный залив, чтобы избежать белых щелей -->
    <rect width="512" height="512" fill="url(#blue_gradient)" rx="120" />
    
    <!-- Оптическая центровка S: чуть выше и левее математического центра, чтобы смотрелось ровно -->
    <text x="49.5%" y="49.5%" 
          font-family="Outfit, Inter, -apple-system, sans-serif" 
          font-weight="900" 
          font-size="310" 
          fill="white" 
          text-anchor="middle"
          dominant-baseline="central">S</text>
</svg>


