<!DOCTYPE html>
<html lang="ru">
  <head>
  <meta charset="utf-8">
  <title>Sdadim - Подготовка к экзамену DGT</title>
    <script>
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // Redirect to index.html with the path encoded in the query string
    // КРИТИЧНО: Этот скрипт работает ТОЛЬКО для GitHub Pages, не для Vercel
    // Vercel обрабатывает SPA routing через vercel.json
    
    // Проверяем, что мы на GitHub Pages, а не на Vercel
    var isGitHubPages = window.location.hostname === 'dmitry-kuzmin.github.io' || 
                        window.location.hostname.includes('github.io');
    var isVercel = window.location.hostname.includes('vercel.app') || 
                   window.location.hostname.includes('skilyapp.com');
    
    // Выполняем редирект только для GitHub Pages
    if (isGitHubPages && !isVercel) {
      var pathSegmentsToKeep = 1; // For repo at /sdadim-dgt-prep/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
    </script>
  </head>
  <body>
  </body>
</html>
