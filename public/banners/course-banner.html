<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skily — Живой курс DGT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── Banner fills the iframe 100%×100% ──────────────────────────────
   border-radius and outer shadow come from the iframe CSS on the
   partner's page — we only handle INNER decoration here.          */

a.banner {
  display: flex;
  align-items: center;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #07091a 0%, #0e1330 55%, #07091a 100%);
  border: 1px solid rgba(99,102,241,0.3);
  overflow: hidden;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  transition: filter .2s ease;
}
a.banner:hover { filter: brightness(1.07); }

/* Left ambient glow */
a.banner::before {
  content: '';
  position: absolute;
  top: -40%; left: -6%;
  width: 48%; height: 180%;
  background: radial-gradient(ellipse, rgba(99,102,241,.28) 0%, transparent 62%);
  pointer-events: none;
  z-index: 0;
}
/* Dot grid */
a.banner::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* ── Logo column ─────────────────────────────────────────────────── */
.col-logo {
  flex-shrink: 0;
  width: clamp(56px, 17vw, 100px);
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
}
.logo-box {
  width:  clamp(34px, 10.5vw, 62px);
  height: clamp(34px, 10.5vw, 62px);
  border-radius: 24%;
  background: linear-gradient(135deg, #4f7ef8 0%, #2563eb 55%, #1e40af 100%);
  box-shadow: 0 0 0 1px rgba(99,102,241,.45), 0 0 20px rgba(99,102,241,.35);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-box svg {
  width:  60%;
  height: 60%;
}

/* ── Body ────────────────────────────────────────────────────────── */
.col-body {
  flex: 1;
  min-width: 0;
  padding: 0 clamp(8px, 2.5vw, 16px);
  display: flex; flex-direction: column; gap: clamp(3px, .7vw, 5px);
  position: relative; z-index: 1;
}

.eyebrow {
  font-size: clamp(7.5px, 1.65vw, 10px);
  font-weight: 700;
  letter-spacing: .17em;
  text-transform: uppercase;
  color: rgba(165,180,252,.85);
  white-space: nowrap;
}

.title {
  font-size: clamp(12px, 3.3vw, 19px);
  font-weight: 900;
  color: #fff;
  line-height: 1.18;
  letter-spacing: -.025em;
}

.subtitle {
  font-size: clamp(8px, 1.95vw, 12px);
  color: rgba(255,255,255,.4);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chips {
  display: flex; gap: clamp(3px, .9vw, 6px);
  flex-wrap: nowrap; overflow: hidden;
  margin-top: clamp(2px, .6vw, 5px);
}

.chip {
  font-size: clamp(8px, 1.75vw, 10.5px);
  font-weight: 600;
  color: rgba(255,255,255,.78);
  background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.22);
  border-radius: 4px;
  padding: clamp(2px,.5vw,3.5px) clamp(5px,1.2vw,8px);
  display: flex; align-items: center; gap: 3px;
  white-space: nowrap; flex-shrink: 0;
}
.chip.hi { background: rgba(99,102,241,.24); border-color: rgba(99,102,241,.46); color: #a5b4fc; }
.dot {
  width: 5px; height: 5px; background: #818cf8;
  border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 5px rgba(99,102,241,.7);
  animation: live 2.2s ease-in-out infinite;
}
@keyframes live { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.loading { font-size: clamp(8px,1.7vw,11px); color: rgba(255,255,255,.28); animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:.3} 50%{opacity:.75} }

/* ── CTA column ──────────────────────────────────────────────────── */
.col-cta {
  flex-shrink: 0;
  padding: 0 clamp(12px, 3.5vw, 22px) 0 clamp(6px, 1.5vw, 10px);
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  gap: clamp(5px, 1.3vw, 10px);
  position: relative; z-index: 1;
}

.badge {
  font-size: clamp(7px, 1.55vw, 9.5px);
  font-weight: 700;
  color: rgba(165,180,252,.7);
  letter-spacing: .06em;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.45;
  white-space: nowrap;
}

.cta {
  display: inline-flex; align-items: center; gap: 5px;
  padding: clamp(7px,1.6vw,11px) clamp(11px,2.5vw,17px);
  background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
  border-radius: 8px;
  font-size: clamp(10px, 2.2vw, 13px);
  font-weight: 800; color: #fff;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(99,102,241,.4), 0 0 0 1px rgba(255,255,255,.08) inset;
  letter-spacing: -.01em;
}
.cta svg { width: clamp(10px,2vw,13px); height: clamp(10px,2vw,13px); flex-shrink: 0; }

/* ── Slim mode (height ≤ 100px e.g. leaderboard 728×90) ─────────── */
body.slim .title br        { display: none; }
body.slim .subtitle        { display: none; }
body.slim .chips           { display: none; }
body.slim .badge           { display: none; }
body.slim .title           { font-size: clamp(11px, 2.5vw, 16px); }

/* Attribution */
.attr {
  position: fixed; bottom: 3px; right: 8px;
  font-size: 8px; color: rgba(255,255,255,.14);
  font-family: -apple-system, sans-serif; z-index: 10;
}
.attr a { color: rgba(99,102,241,.4); text-decoration: none; }
</style>
</head>
<body>

<a id="banner-link" href="https://t.me/skilyapp_bot/skilyapp" target="_blank" rel="noopener noreferrer" class="banner">

  <!-- Logo -->
  <div class="col-logo">
    <div class="logo-box">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <text x="50" y="73" text-anchor="middle"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
          font-weight="900" font-size="82" fill="white">S</text>
      </svg>
    </div>
  </div>

  <!-- Body -->
  <div class="col-body">
    <div class="eyebrow">Живой курс · Skily</div>
    <div class="title">Права в Испании<br>с преподавателем</div>
    <div class="subtitle">2 занятия в неделю · 2 месяца · ведём до результата</div>
    <div class="chips" id="chips">
      <span class="loading">Загружаем потоки…</span>
    </div>
  </div>

  <!-- CTA -->
  <div class="col-cta">
    <div class="badge">Ближайший<br>поток стартует</div>
    <div class="cta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      Записаться
    </div>
  </div>

</a>

<div class="attr">Реклама · <a href="https://skilyapp.com/partners" target="_blank">Skily</a></div>

<script>
(function(){
  // Slim mode for very short banners (leaderboard 728×90, mobile 320×50)
  function checkSlim() {
    if (window.innerHeight <= 100) document.body.classList.add('slim');
    else document.body.classList.remove('slim');
  }
  checkSlim();
  window.addEventListener('resize', checkSlim);

  // ── Live course streams ──────────────────────────────────────────
  var SURL = 'https://yffjnqegeiorunyvcxkn.supabase.co';
  var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZmpucWVnZWlvcnVueXZjeGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDQyMTYsImV4cCI6MjA3ODA4MDIxNn0.PPYZpFYOizWxpyPp4JH7G9oTU33KDhoViwEIKUZZbLA';
  var MO = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  function fmt(d){ var x = new Date(d+'T00:00:00'); return x.getDate()+' '+MO[x.getMonth()]; }
  function spots(e,t){ var l=t-e; return l<=0?'нет мест':l===1?'1 место':l<5?l+' места':l+' мест'; }

  fetch(SURL+'/rest/v1/course_streams?status=eq.open&order=start_date.asc&limit=3&select=start_date,spots_total,spots_enrolled',
    { headers:{'apikey':KEY,'Authorization':'Bearer '+KEY} })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var c = document.getElementById('chips');
      if (!c) return;
      if (!data || !data.length) {
        c.innerHTML = '<span style="font-size:clamp(8px,1.7vw,11px);color:rgba(255,255,255,.3)">Скоро новые потоки!</span>';
        return;
      }
      c.innerHTML = data.slice(0,3).map(function(s,i){
        return '<span class="chip'+(i===0?' hi':'')+'">'+
          (i===0?'<span class="dot"></span>':'')+
          fmt(s.start_date)+' · '+spots(s.spots_enrolled,s.spots_total)+'</span>';
      }).join('');
    })
    .catch(function(){
      var c = document.getElementById('chips');
      if (c) c.innerHTML = '<span style="font-size:clamp(8px,1.7vw,11px);color:rgba(255,255,255,.3)">Следующий поток — скоро</span>';
    });

  // ── Referral link ────────────────────────────────────────────────
  var ref = (typeof SKILY_REF !== 'undefined') ? SKILY_REF : null;
  if (ref) {
    var l = document.getElementById('banner-link');
    if (l) l.href = 'https://skilyapp.com/?ref=' + ref;
  }
})();
</script>

</body>
</html>
