<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skily — Курс DGT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  /* The banner is designed at 560×170 — JS scales it to fit any iframe size */
  .wrap {
    position: fixed;
    top: 0; left: 0;
    width: 560px;
    height: 170px;
    transform-origin: top left;
  }

  .banner {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #060a14 0%, #0d1426 50%, #060a14 100%);
    border-radius: 20px;
    border: 1px solid rgba(99,102,241,0.3);
    overflow: hidden;
    display: flex;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    transition: transform .2s ease, box-shadow .2s ease;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 20px 60px rgba(99,102,241,0.15), 0 4px 20px rgba(0,0,0,0.5);
  }
  .banner:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 24px 70px rgba(99,102,241,0.25), 0 8px 32px rgba(0,0,0,0.6);
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -30%; left: -10%;
    width: 55%; height: 170%;
    background: radial-gradient(ellipse, rgba(99,102,241,0.22) 0%, transparent 65%);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(to right,rgba(255,255,255,0.02) 1px,transparent 1px), linear-gradient(to bottom,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* Icon column */
  .col-icon {
    position: relative; z-index: 1;
    flex-shrink: 0;
    width: 104px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-box {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(139,92,246,0.15) 100%);
    border: 1px solid rgba(99,102,241,0.35);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: 0 0 24px rgba(99,102,241,0.2);
  }

  /* Body */
  .col-body {
    position: relative; z-index: 1;
    flex: 1;
    padding: 0 12px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    color: rgba(139,92,246,.9);
  }
  .title {
    font-size: 17px; font-weight: 800;
    line-height: 1.2; color: #fff;
    letter-spacing: -.02em;
  }
  .subtitle {
    font-size: 12px; color: rgba(255,255,255,.45); line-height: 1.35;
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
  .chip {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,.8);
    background: rgba(99,102,241,.14);
    border: 1px solid rgba(99,102,241,.22);
    border-radius: 6px;
    padding: 3px 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .chip.hi { background: rgba(99,102,241,.26); border-color: rgba(99,102,241,.5); color: #a5b4fc; }
  .dot { width: 5px; height: 5px; background: #6366f1; border-radius: 50%; flex-shrink: 0; }
  .loading { font-size: 11px; color: rgba(255,255,255,.3); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.85} }

  /* Right CTA */
  .col-cta {
    position: relative; z-index: 1;
    flex-shrink: 0;
    padding: 0 18px 0 8px;
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 8px;
  }
  .price-label { font-size: 9px; color: rgba(255,255,255,.3); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1px; }
  .price-amount { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: -.03em; line-height: 1; }
  .price-note { font-size: 9px; color: rgba(255,255,255,.25); }
  .cta {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 14px;
    background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
    border-radius: 10px;
    font-size: 12px; font-weight: 700; color: #fff;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(99,102,241,.35);
  }
  .cta svg { width: 12px; height: 12px; }

  .attr {
    position: fixed; bottom: 3px; right: 10px;
    font-size: 9px; color: rgba(255,255,255,.18);
  }
  .attr a { color: rgba(99,102,241,.5); text-decoration: none; }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <a id="banner-link" href="https://t.me/skilyapp_bot/skilyapp" target="_blank" rel="noopener noreferrer" class="banner" aria-label="Skily Курс DGT">
    <div class="col-icon">
      <div class="icon-box">🚗</div>
    </div>
    <div class="col-body">
      <div class="eyebrow">Полный курс · Skily</div>
      <div class="title">Подготовка к DGT<br>с нуля до прав</div>
      <div class="subtitle">Видеоуроки + AI-тьютор + 3 500 вопросов</div>
      <div class="chips" id="chips"><span class="loading">Загружаем даты…</span></div>
    </div>
    <div class="col-cta">
      <div>
        <div class="price-label">Цена курса</div>
        <div class="price-amount">€300</div>
        <div class="price-note">разовая оплата</div>
      </div>
      <div class="cta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Записаться
      </div>
    </div>
  </a>
</div>

<div class="attr">Реклама · <a href="https://skilyapp.com/partners" target="_blank">Skily</a></div>

<script>
(function(){
  // ── Scale to fill iframe ──────────────────────────────────────────
  var BASE_W = 560, BASE_H = 170;
  function resize() {
    var scaleX = window.innerWidth  / BASE_W;
    var scaleY = window.innerHeight / BASE_H;
    var s = Math.min(scaleX, scaleY);
    var wrap = document.getElementById('wrap');
    wrap.style.transform = 'scale(' + s + ')';
    // Centre if letterboxed
    var left = (window.innerWidth  - BASE_W * s) / 2;
    var top  = (window.innerHeight - BASE_H * s) / 2;
    wrap.style.left = left + 'px';
    wrap.style.top  = top  + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Fetch streams ─────────────────────────────────────────────────
  var SURL = 'https://yffjnqegeiorunyvcxkn.supabase.co';
  var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZmpucWVnZWlvcnVueXZjeGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MDQyMTYsImV4cCI6MjA3ODA4MDIxNn0.PPYZpFYOizWxpyPp4JH7G9oTU33KDhoViwEIKUZZbLA';
  var MO   = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  function fmt(d){ var x=new Date(d+'T00:00:00'); return x.getDate()+' '+MO[x.getMonth()]; }
  function spots(e,t){ var l=t-e; return l<=0?'нет мест':l===1?'1 место':l<5?l+' места':l+' мест'; }

  fetch(SURL+'/rest/v1/course_streams?status=eq.open&order=start_date.asc&limit=3&select=start_date,spots_total,spots_enrolled',
    { headers:{'apikey':KEY,'Authorization':'Bearer '+KEY} })
    .then(function(r){return r.json();})
    .then(function(data){
      var c = document.getElementById('chips');
      if(!c) return;
      if(!data||!data.length){ c.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,.35)">Скоро новые даты — следи!</span>'; return; }
      c.innerHTML = data.slice(0,3).map(function(s,i){
        return '<span class="chip'+(i===0?' hi':'')+'">'+(i===0?'<span class="dot"></span>':'')+fmt(s.start_date)+' · '+spots(s.spots_enrolled,s.spots_total)+'</span>';
      }).join('');
    })
    .catch(function(){ var c=document.getElementById('chips'); if(c) c.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,.35)">Следующий поток — скоро</span>'; });

  // ── Referral link ─────────────────────────────────────────────────
  var ref = (typeof SKILY_REF!=='undefined')?SKILY_REF:null;
  if(ref){ var l=document.getElementById('banner-link'); if(l) l.href='https://skilyapp.com/?ref='+ref; }
})();
</script>
</body>
</html>
