<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- CURRENT SKILY LOGO (2025) -->
    <!-- Extracted from LandingLogo.tsx component (header variant) -->
    <!-- Icon: car-front from Lucide (car facing forward with headlights) -->
    
    <defs>
        <linearGradient id="blue_gradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#2563eb" />
            <stop offset="100%" stop-color="#1d4ed8" />
        </linearGradient>
        <linearGradient id="inner_glow" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.1" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
    </defs>
    
    <!-- Blue rounded square (w-10 h-10 rounded-2xl) -->
    <rect x="0" y="0" width="60" height="60" rx="18" fill="url(#blue_gradient)" />
    <rect x="0" y="0" width="60" height="60" rx="18" fill="url(#inner_glow)" />
    
    <!-- Car-front icon from Lucide -->
    <!-- Original viewBox: 0 0 24 24 -->
    <g transform="translate(18, 18) scale(1.0)" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="m21 8-2 2-1.5-3.7A2 2 0 0 0 15.646 5H8.4a2 2 0 0 0-1.903 1.257L5 10 3 8" />
        <path d="M7 14h.01" />
        <path d="M17 14h.01" />
        <rect width="18" height="8" x="3" y="10" rx="2" />
        <path d="M5 18v2" />
        <path d="M19 18v2" />
    </g>

    <!-- Text "Skily" (Inter font-black) -->
    <text x="75" y="42" 
