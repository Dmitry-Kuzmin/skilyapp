<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>Acceso a Skily</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a !important;
            color: #ffffff !important;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
        }

        /* Универсальные классы для принудительных цветов */
        .bg-dark {
            background-color: #0f172a !important;
        }

        .text-white {
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        .text-slate {
            color: #94a3b8 !important;
            -webkit-text-fill-color: #94a3b8 !important;
        }

        .text-link {
            color: #3b82f6 !important;
            -webkit-text-fill-color: #3b82f6 !important;
            text-decoration: none;
        }

        .text-dark-gray {
            color: #64748b !important;
            -webkit-text-fill-color: #64748b !important;
        }

        /* Цвет, который виден везде */

        img {
            border: 0;
            outline: none;
            text-decoration: none;
            display: block;
        }

        @media only screen and (max-width: 480px) {
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            .card-padding {
                padding: 32px 20px !important;
            }
        }
    </style>
</head>

<body class="bg-dark" style="background-color: #0f172a;">

    <!-- Wrapper -->
    <center style="width: 100%; background-color: #0f172a; table-layout: fixed;">
        <div style="max-width: 500px; margin: 0 auto; padding-top: 40px; padding-bottom: 40px;">

            <!-- Logo (Full Version) -->
            <div style="text-align: center; padding-bottom: 32px;">
                <img src="{{ .SiteURL }}/email-assets/skily-logo.png" alt="Skily" width="140" height="auto"
                    style="margin: 0 auto; max-width: 140px; height: auto;" />
            </div>

            <!-- Card -->
            <div class="container" style="padding: 0 12px;">
                <div
                    style="background-color: #1e293b; border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.2); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">

                    <!-- Top Line -->
                    <div style="height: 3px; background-color: #3b82f6; width: 100%;"></div>

                    <!-- Card Content -->
                    <div class="card-padding" style="padding: 40px 32px; text-align: center;">

                        <!-- Title (ES) -->
                        <h1 class="text-white"
                            style="margin: 0 0 12px 0; font-family: sans-serif; font-size: 28px; font-weight: 800; line-height: 1.2;">
                            Acceso a Skily
                        </h1>

                        <!-- Emoji -->
                        <div style="font-size: 40px; line-height: 1; margin-bottom: 20px;">🚀</div>

                        <!-- Desc (ES) -->
                        <p class="text-slate"
                            style="margin: 0 0 24px 0; font-family: sans-serif; font-size: 15px; line-height: 1.5;">
                            Pulsa el botón de abajo para acceder a tu cuenta.
                        </p>

                        <!-- Button -->
                        <div style="margin-bottom: 24px;">
                            <a href="{{ .ConfirmationURL }}"
                                style="display: inline-block; background-color: #3b82f6; color: #ffffff; font-family: sans-serif; font-size: 16px; font-weight: 700; text-decoration: none; padding: 16px 32px; border-radius: 12px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);">
                                Entrar / Sign in
                            </a>
                        </div>

                        <!-- Desc (EN) -->
                        <p class="text-dark-gray"
                            style="margin: 0; font-family: sans-serif; font-size: 13px; line-height: 1.4;">
                            Click the button above to sign in instantly
                        </p>

                        <!-- Expiry -->
                        <p class="text-dark-gray" style="margin: 16px 0 0 0; font-family: sans-serif; font-size: 11px;">
                            ⏱ Expira en 24h &bull; Expires in 24h
                        </p>

                    </div>
                </div>
            </div>

            <!-- Help & Link (Visible on any background) -->
            <div style="text-align: center; padding: 32px 20px 0 20px;">
                <p class="text-dark-gray"
                    style="margin: 0 0 8px 0; font-family: sans-serif; font-size: 11px; color: #64748b;">
                    ¿Botón no funciona? / Link not working?
                </p>
                <div
                    style="background-color: rgba(59, 130, 246, 0.1); border-radius: 8px; padding: 8px 12px; display: inline-block; max-width: 100%;">
                    <a href="{{ .ConfirmationURL }}" class="text-link"
                        style="font-family: monospace; font-size: 11px; display: block; word-break: break-all; color: #3b82f6;">
                        {{ .ConfirmationURL }}
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <div style="text-align: center; padding-top: 24px;">
                <p class="text-dark-gray" style="margin: 0; font-family: sans-serif; font-size: 12px; color: #64748b;">
                    &copy; 2024 Skily App
                </p>
            </div>

        </div>
    </center>
</body>

</html>
