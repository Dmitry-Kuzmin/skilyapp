<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>Acceso a Skily</title>
    <!--[if !mso]><!-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!--<![endif]-->
    <style type="text/css">
        /* RESET */
        body,
        table,
        td,
        a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }

        /* FONTS */
        .font-inter {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* HOVER (for clients that support it) */
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.5) !important;
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #0f172a; width: 100%;">

    <!-- WRAPPER -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #0f172a;">
        <tr>
            <td align="center" style="padding: 48px 16px;">

                <!-- CONTAINER -->
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 440px;">

                    <!-- LOGO (Text) -->
                    <tr>
                        <td align="center" style="padding-bottom: 24px;">
                            <h2 class="font-inter"
                                style="margin: 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #3b82f6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: #3b82f6;">
                                Skily
                            </h2>
                        </td>
                    </tr>

                    <!-- CARD -->
                    <tr>
                        <td>
                            <table border="0" cellpadding="0" cellspacing="0" width="100%"
                                style="background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%); background-color: #ffffff; border-radius: 24px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1); overflow: hidden;">

                                <!-- GRADIENT TOP -->
                                <tr>
                                    <td height="2"
                                        style="background: linear-gradient(90deg, #3b82f6, #6366f1, #8b5cf6); line-height: 2px; font-size: 2px;">
                                        &nbsp;</td>
                                </tr>

                                <!-- CONTENT -->
                                <tr>
                                    <td align="center" style="padding: 48px 32px;">

                                        <!-- TITLE -->
                                        <h1 class="font-inter"
                                            style="margin: 0 0 12px 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 22px; font-weight: 700; line-height: 28px; color: #1e293b !important;">
                                            Acceso a Skily
                                        </h1>

                                        <!-- EMOJI -->
                                        <div style="font-size: 40px; line-height: 48px; margin-bottom: 24px;">🚀</div>

                                        <!-- DESCRIPTION ES -->
                                        <p class="font-inter"
                                            style="margin: 0 0 32px 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 16px; line-height: 26px; color: #475569;">
                                            Pulsa el botón de abajo para acceder a tu cuenta y continuar tu preparación.
                                        </p>

                                        <!-- BUTTON -->
                                        <table border="0" cellspacing="0" cellpadding="0" width="100%">
                                            <tr>
                                                <td align="center">
                                                    <a href="{{ .ConfirmationURL }}" target="_blank" class="btn-primary"
                                                        style="display: inline-block; padding: 16px 48px; font-family: 'Inter', -apple-system, sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; text-decoration: none; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); background-color: #3b82f6; border-radius: 12px; box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4); transition: all 0.2s ease;">
                                                        Entrar / Sign in
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>

                                        <!-- DIVIDER -->
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%"
                                            style="margin-top: 32px;">
                                            <tr>
                                                <td style="border-top: 1px solid #e2e8f0; padding-top: 24px;">
                                                    <!-- DESCRIPTION EN -->
                                                    <p class="font-inter"
                                                        style="margin: 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 22px; color: #94a3b8; text-align: center;">
                                                        Click the button above to sign in instantly
                                                    </p>
                                                </td>
                                            </tr>
                                        </table>

                                        <!-- TIMER -->
                                        <p class="font-inter"
                                            style="margin: 16px 0 0 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; line-height: 20px; color: #94a3b8;">
                                            ⏱️ Expira en 24h · Expires in 24h
                                        </p>

                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- COPY LINK -->
                    <tr>
                        <td align="center" style="padding: 32px 0;">
                            <p class="font-inter"
                                style="margin: 0 0 12px 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; line-height: 20px; color: #64748b;">
                                ¿Botón no funciona? / Link not working?
                            </p>
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center"
                                        style="background-color: rgba(30, 41, 59, 0.8); border-radius: 12px; padding: 16px;">
                                        <a href="{{ .ConfirmationURL }}"
                                            style="font-family: 'SF Mono', Consolas, monospace; font-size: 11px; line-height: 18px; color: #60a5fa; text-decoration: none; word-break: break-all; display: block;">
                                            {{ .ConfirmationURL }}
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td align="center">
                            <p class="font-inter"
                                style="margin: 0; font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; line-height: 18px; color: #64748b;">
                                © 2026 Skily App
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
