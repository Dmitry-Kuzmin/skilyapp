<!DOCTYPE html>
<html lang="es" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>Acceso a Skily</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            border: 0;
            outline: none;
            text-decoration: none;
            -ms-interpolation-mode: bicubic;
        }

        /* General Resets */
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #0f172a;
        }

        .main-table {
            background-color: #0f172a;
            margin: 0 auto;
            width: 100%;
            max-width: 500px;
        }

        /* Mobile */
        @media only screen and (max-width: 480px) {
            .mobile-pad {
                padding-left: 10px !important;
                padding-right: 10px !important;
            }

            .card-pad {
                padding: 30px 20px !important;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #0f172a !important;">

    <center class="wrapper" style="width: 100%; table-layout: fixed; background-color: #0f172a;">
        <table class="main-table" align="center" border="0" cellpadding="0" cellspacing="0" width="100%"
            style="max-width: 500px;">

            <!-- Spacer -->
            <tr>
                <td height="40" style="font-size: 40px; line-height: 40px;">&nbsp;</td>
            </tr>

            <!-- Logo -->
            <tr>
                <td align="center" style="padding-bottom: 30px;">
                    <img src="./email-assets/skily-logo-final.png" alt="Skily" width="80" height="80"
                        style="display: block; width: 80px; height: 80px; border-radius: 20px;" />
                </td>
            </tr>

            <!-- CARD (Dark Blue) -->
            <tr>
                <td class="mobile-pad" align="center" style="padding: 0 10px;">
                    <table border="0" cellpadding="0" cellspacing="0" width="100%"
                        style="background-color: #1e293b; border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.2); overflow: hidden;">

                        <!-- Accent Line -->
                        <tr>
                            <td height="3" style="background-color: #3b82f6; font-size: 0; line-height: 0;">&nbsp;</td>
                        </tr>

                        <!-- Content Cell -->
                        <tr>
                            <td class="card-pad" align="center" style="padding: 40px 30px;">

                                <!-- Title -->
                                <h1
                                    style="margin: 0 0 10px 0; font-family: sans-serif; font-size: 28px; font-weight: 800; color: #ffffff !important; line-height: 1.2;">
                                    Acceso a Skily
                                </h1>

                                <!-- Emoji -->
                                <div style="font-size: 36px; line-height: 1; margin-bottom: 20px;">🚀</div>

                                <!-- ES Text -->
                                <p
                                    style="margin: 0 0 24px 0; font-family: sans-serif; font-size: 15px; line-height: 1.5; color: #cbd5e1 !important;">
                                    Pulsa el botón de abajo para acceder a tu cuenta.
                                </p>

                                <!-- Button -->
                                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                    <tr>
                                        <td align="center">
                                            <!--[if mso]>
                                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://skily.app/auth/confirm?token=example..." style="height:50px;v-text-anchor:middle;width:220px;" arcsize="24%" stroke="f" fillcolor="#3b82f6">
                                            <w:anchorlock/>
                                            <center style="color:#ffffff;font-family:sans-serif;font-size:16px;font-weight:bold;">Entrar / Sign in</center>
                                            </v:roundrect>
                                            <![endif]-->
                                            <!--[if !mso]><!-->
                                            <a href="https://skily.app/auth/confirm?token=example..."
                                                style="display: inline-block; background-color: #3b82f6; color: #ffffff; font-family: sans-serif; font-size: 16px; font-weight: 700; text-decoration: none; padding: 15px 40px; border-radius: 12px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);">
                                                Entrar / Sign in
                                            </a>
                                            <!--<![endif]-->
                                        </td>
                                    </tr>
                                </table>

                                <!-- EN Text -->
                                <p
                                    style="margin: 24px 0 0 0; font-family: sans-serif; font-size: 13px; line-height: 1.4; color: #64748b !important;">
                                    Click the button above to sign in instantly
                                </p>

                                <!-- Timer -->
                                <p
                                    style="margin: 16px 0 0 0; font-family: sans-serif; font-size: 12px; color: #64748b !important;">
                                    ⏱ Expira en 24h &bull; Expires in 24h
                                </p>

                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <!-- Copy Link -->
            <tr>
                <td align="center" style="padding: 24px 20px;">
                    <p style="margin: 0 0 10px 0; font-family: sans-serif; font-size: 11px; color: #64748b !important;">
                        ¿Botón no funciona? / Link not working?
                    </p>
                    <table border="0" cellpadding="0" cellspacing="0"
                        style="background-color: rgba(59, 130, 246, 0.1); border-radius: 8px;">
                        <tr>
                            <td style="padding: 10px;">
                                <a href="https://skily.app/auth/confirm?token=example..."
                                    style="font-family: monospace; font-size: 11px; color: #3b82f6 !important; text-decoration: none; word-break: break-all; display: block;">
                                    https://skily.app/auth/confirm?token=example...
                                </a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <!-- Footer -->
            <tr>
                <td align="center" style="padding-bottom: 40px;">
                    <p style="margin: 0; font-family: sans-serif; font-size: 12px; color: #64748b !important;">
                        &copy; 2024 Skily App
                    </p>
                </td>
            </tr>

        </table>
    </center>
</body>

</html>
