<!DOCTYPE html>
<html lang="es" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>Acceso a Skily</title>
    <style>
        /* CSS Reset */
        body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            background-color: #0f172a !important;
        }

        img {
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
            -ms-interpolation-mode: bicubic;
        }

        /* Force Dark Background & Light Text */
        .wrapper {
            background-color: #0f172a !important;
            width: 100%;
            table-layout: fixed;
            -webkit-font-smoothing: antialiased;
        }

        .text-white {
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        .text-gray {
            color: #cbd5e1 !important;
            -webkit-text-fill-color: #cbd5e1 !important;
        }

        .text-sub {
            color: #94a3b8 !important;
            -webkit-text-fill-color: #94a3b8 !important;
        }

        /* Mobile spacing */
        @media only screen and (max-width: 480px) {
            .mobile-pad {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            .card-pad {
                padding: 32px 20px !important;
            }
        }
    </style>
    <!--[if gte mso 9]>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
    <![endif]-->
</head>

<body style="margin: 0; padding: 0; background-color: #0f172a !important;">

    <center class="wrapper" style="width: 100%; background-color: #0f172a;">
        <div style="max-width: 500px; margin: 0 auto;">

            <!-- Spacer Top -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                    <td height="40" style="font-size: 40px; line-height: 40px;">&nbsp;</td>
                </tr>
            </table>

            <!-- Logo -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                    <td align="center">
                        <img src="./email-assets/skily-logo.png" alt="Skily" width="80" height="80"
                            style="display: block; width: 80px; height: 80px; border-radius: 20px;" />
                    </td>
                </tr>
                <tr>
                    <td height="32" style="font-size: 32px; line-height: 32px;">&nbsp;</td>
                </tr>
            </table>

            <!-- Card -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                    <td class="mobile-pad" align="center" style="padding: 0 12px;">

                        <table border="0" cellpadding="0" cellspacing="0" width="100%"
                            style="background-color: #1e293b; border-radius: 24px; border: 1px solid rgba(59, 130, 246, 0.2); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
                            <!-- Blue Top Line -->
                            <tr>
                                <td height="2"
                                    style="background: linear-gradient(90deg, #1e293b, #3b82f6, #1e293b); font-size: 0; line-height: 0;">
                                    &nbsp;</td>
                            </tr>

                            <tr>
                                <td class="card-pad" align="center" style="padding: 40px 32px;">

                                    <!-- Title -->
                                    <h1 class="text-white"
                                        style="margin: 0 0 12px 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 800; color: #ffffff; line-height: 1.2;">
                                        Acceso a Skily
                                    </h1>

                                    <!-- Emoji -->
                                    <div style="font-size: 36px; line-height: 1; margin-bottom: 20px;">🚀</div>

                                    <!-- Descr ES -->
                                    <p class="text-gray"
                                        style="margin: 0 0 20px 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; line-height: 1.6; color: #cbd5e1;">
                                        Pulsa el botón de abajo para acceder a tu cuenta.
                                    </p>

                                    <!-- Divider -->
                                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                        <tr>
                                            <td align="center" style="padding-bottom: 20px;">
                                                <div
                                                    style="width: 40px; height: 1px; background-color: rgba(148, 163, 184, 0.2);">
                                                </div>
                                            </td>
                                        </tr>
                                    </table>

                                    <!-- Descr EN -->
                                    <p class="text-sub"
                                        style="margin: 0 0 32px 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; line-height: 1.5; color: #94a3b8;">
                                        Click the button below to sign in instantly
                                    </p>

                                    <!-- Button -->
                                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                        <tr>
                                            <td align="center">
                                                <!--[if mso]>
                                                <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://skily.app/auth/confirm?token=example..." style="height:54px;v-text-anchor:middle;width:240px;" arcsize="22%" stroke="f" fillcolor="#3b82f6">
                                                <w:anchorlock/>
                                                <center style="color:#ffffff;font-family:sans-serif;font-size:16px;font-weight:700;">Entrar / Sign in</center>
                                                </v:roundrect>
                                                <![endif]-->
                                                <!--[if !mso]><!-->
                                                <a href="https://skily.app/auth/confirm?token=example..."
                                                    style="display: inline-block; background-color: #3b82f6; background-image: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 12px; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 16px; font-weight: 700; line-height: 54px; text-decoration: none; width: 100%; max-width: 240px; text-align: center; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);">
                                                    Entrar / Sign in
                                                </a>
                                                <!--<![endif]-->
                                            </td>
                                        </tr>
                                    </table>

                                    <!-- Expiry -->
                                    <p class="text-sub"
                                        style="margin: 24px 0 0 0; font-family: sans-serif; font-size: 12px; color: #64748b;">
                                        ⏱ Expira en 24h &bull; Expires in 24h
                                    </p>

                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>
            </table>

            <!-- Copy Link -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                    <td align="center" style="padding: 24px 20px;">
                        <p class="text-sub"
                            style="margin: 0 0 8px 0; font-family: sans-serif; font-size: 11px; color: #64748b;">
                            ¿Botón no funciona? / Link not working?
                        </p>
                        <a href="https://skily.app/auth/confirm?token=example..." class="text-white"
                            style="display: block; font-family: 'Courier New', monospace; font-size: 10px; color: #cbd5e1; text-decoration: none; word-break: break-all;">
                            https://skily.app/auth/confirm?token=example...
                        </a>
                    </td>
                </tr>
            </table>

            <!-- Footer -->
            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                    <td align="center" style="padding-bottom: 40px;">
                        <p class="text-sub"
                            style="margin: 0; font-family: sans-serif; font-size: 12px; color: #64748b;">
                            &copy; 2024 Skily App
                        </p>
                    </td>
                </tr>
            </table>

        </div>
    </center>
</body>

</html>
