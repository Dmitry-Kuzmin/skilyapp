<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>Acceso a Skily</title>
    <style type="text/css">
        /* RESET */
        body,
        table,
        td,
        a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        /* THEME COLORS (Hardcoded for stability) */
        .bg-body {
            background-color: #0f172a !important;
        }

        .bg-card {
            background-color: #1e293b !important;
        }

        .text-white {
            color: #ffffff !important;
        }

        .text-gray {
            color: #cbd5e1 !important;
        }

        .text-muted {
            color: #64748b !important;
        }

        .accent-blue {
            color: #3b82f6 !important;
        }

        /* CLIENT SPECIFIC FIXES */
        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Button Hover */
        .btn-primary:hover {
            opacity: 0.9 !important;
        }
    </style>
    <!--[if gte mso 9]>
    <xml>
        <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
    </xml>
    <![endif]-->
</head>

<body class="bg-body" style="margin: 0; padding: 0; background-color: #0f172a; width: 100%;">

    <!-- MAIN WRAPPER TABLE (100% Width) -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" class="bg-body" style="background-color: #0f172a;">
        <tr>
            <td align="center" style="padding: 40px 10px;">

                <!-- CONTAINER (Max 500px) -->
                <!--[if (gte mso 9)|(IE)]>
                <table align="center" border="0" cellspacing="0" cellpadding="0" width="500">
                <tr>
                <td align="center" valign="top">
                <![endif]-->
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px;">

                    <!-- LOGO -->
                    <tr>
                        <td align="center" style="padding-bottom: 30px;">
                            <img src="./email-assets/skily-logo-final.png" width="80" height="80"
                                alt="Skily"
                                style="display: block; border: 0; width: 80px; max-width: 80px; height: 80px; border-radius: 20px;" />
                        </td>
                    </tr>

                    <!-- CARD -->
                    <tr>
                        <td align="center">
                            <!-- CARD TABLE -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" class="bg-card"
                                style="background-color: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden;">

                                <!-- BLUE STRIPE TOP -->
                                <tr>
                                    <td height="4" style="background-color: #3b82f6; line-height: 4px; font-size: 4px;">
                                        &nbsp;</td>
                                </tr>

                                <!-- CARD CONTENT -->
                                <tr>
                                    <td align="center" style="padding: 40px 30px;">

                                        <!-- HEADLINE -->
                                        <h1 class="text-white"
                                            style="margin: 0 0 16px 0; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 700; line-height: 32px; color: #ffffff;">
                                            Acceso a Skily
                                        </h1>

                                        <!-- EMOJI -->
                                        <div style="font-size: 36px; line-height: 40px; margin-bottom: 24px;">🚀</div>

                                        <!-- DESCRIPTION (ES) -->
                                        <p class="text-gray"
                                            style="margin: 0 0 24px 0; font-family: Helvetica, Arial, sans-serif; font-size: 16px; line-height: 24px; color: #cbd5e1;">
                                            Pulsa el botón de abajo para acceder a tu cuenta.
                                        </p>

                                        <!-- BUTTON -->
                                        <table border="0" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td align="center" bgcolor="#3b82f6" style="border-radius: 10px;">
                                                    <a href="https://skily.app/auth/confirm?token=example..." target="_blank" class="text-white"
                                                        style="display: inline-block; padding: 14px 32px; font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 10px; background-color: #3b82f6; border: 1px solid #3b82f6;">
                                                        Entrar / Sign in
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>

                                        <!-- DESCRIPTION (EN) -->
                                        <p class="text-muted"
                                            style="margin: 24px 0 0 0; font-family: Helvetica, Arial, sans-serif; font-size: 13px; line-height: 20px; color: #64748b;">
                                            Click the button above to sign in instantly
                                        </p>

                                        <!-- TIMER -->
                                        <p class="text-muted"
                                            style="margin: 8px 0 0 0; font-family: Helvetica, Arial, sans-serif; font-size: 12px; line-height: 18px; color: #64748b;">
                                            ⏱ Expira en 24h &bull; Expires in 24h
                                        </p>

                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- COPY LINK SECTION -->
                    <tr>
                        <td align="center" style="padding: 24px 20px;">
                            <p class="text-muted"
                                style="margin: 0 0 10px 0; font-family: Helvetica, Arial, sans-serif; font-size: 12px; line-height: 18px; color: #64748b;">
                                ¿Botón no funciona? / Link not working?
                            </p>
                            <!-- LINK CONTAINER -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" bgcolor="#1A2234"
                                        style="background-color: rgba(59, 130, 246, 0.1); border-radius: 8px; padding: 12px;">
                                        <a href="https://skily.app/auth/confirm?token=example..." class="accent-blue"
                                            style="font-family: Consolas, monospace; font-size: 11px; line-height: 16px; color: #3b82f6; text-decoration: none; color: #3b82f6 !important; word-break: break-all; display: block;">
                                            https://skily.app/auth/confirm?token=example...
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="padding-top: 10px;">
                            <p class="text-muted"
                                style="margin: 0; font-family: Helvetica, Arial, sans-serif; font-size: 12px; line-height: 18px; color: #64748b;">
                                &copy; 2024 Skily App
                            </p>
                        </td>
                    </tr>

                </table>
                <!--[if (gte mso 9)|(IE)]>
                </td>
                </tr>
                </table>
                <![endif]-->

            </td>
        </tr>
    </table>

</body>

</html>
